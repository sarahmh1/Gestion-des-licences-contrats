name: Build and push Docker images

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'projet2024/**'
      - 'light-bootstrap-dashboard-angular2-master/**'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - '.github/workflows/docker-build-push.yml'
  workflow_dispatch:

env:
  BACKEND_IMAGE: sarahmhadhbi/gestion-licences-backend
  FRONTEND_IMAGE: sarahmhadhbi/gestion-licences-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image tag
        id: meta
        run: echo "tag=sha-$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./projet2024
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./light-bootstrap-dashboard-angular2-master
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Summary
        run: |
          echo "Images poussées :"
          echo "  ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}"
          echo "  ${{ env.BACKEND_IMAGE }}:latest"
          echo "  ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}"
          echo "  ${{ env.FRONTEND_IMAGE }}:latest"
