<form [formGroup]="fortinetForm" (ngSubmit)="addFortinet()" class="form-wrapper">
  <h5 class="form-title mb-4">Ajouter licence Fortinet</h5>

  <!-- Client -->
  <div class="form-group client-select-wrapper" style="position: relative; z-index: 10000;">
    <label for="client" class="form-label">Client</label>
    <app-searchable-client-select 
      #clientSelect
      formControlName="client" 
      [clients]="clients">
    </app-searchable-client-select>
    <app-field-error [control]="fortinetForm.get('client')"></app-field-error>
  </div>

  <!-- Nom du bo&#238;tier -->
  <div class="form-group">
    <label for="nomDuBoitier" class="form-label">Nom du bo&#238;tier</label>
    <input
      type="text"
      id="nomDuBoitier"
      class="form-control"
      formControlName="nomDuBoitier"
      placeholder="Nom du bo&#238;tier"
    />
    <app-field-error [control]="fortinetForm.get('nomDuBoitier')"></app-field-error>
  </div>

  <!-- Row: Num&#233;ro de s&#233;rie + Dur&#233;e de la licence -->
  <div class="form-row">
    <div class="form-group">
      <label for="numeroSerie" class="form-label">Num&#233;ro de s&#233;rie</label>
      <input
        type="text"
        id="numeroSerie"
        class="form-control"
        formControlName="numeroSerie"
        placeholder="Num&#233;ro de s&#233;rie"
      />
      <app-field-error [control]="fortinetForm.get('numeroSerie')"></app-field-error>
    </div>

    <div class="form-group">
      <label for="dureeDeLicence" class="form-label">Dur&#233;e de la licence</label>
      <input
        type="text"
        id="dureeDeLicence"
        class="form-control"
        formControlName="dureeDeLicence"
        placeholder="Dur&#233;e de la licence"
      />
    </div>
  </div>

  <!-- Licences -->
  <div class="form-group">
    <label class="form-label">Licences</label>
    <div formArrayName="licences">
      <div
        *ngFor="let licence of licences.controls; let i = index"
        [formGroupName]="i"
        class="licence-row"
      >
        <div class="licence-field-stack"><input
          type="text"
          class="form-control"
          placeholder="Nom de licence"
          formControlName="nomDesLicences" [class.is-invalid]="licences.at(i).get('nomDesLicences')?.invalid && (licences.at(i).get('nomDesLicences')?.dirty || licences.at(i).get('nomDesLicences')?.touched)" /><app-field-error [control]="licences.at(i).get('nomDesLicences')"></app-field-error></div>
        <div class="licence-field-stack">
          <input
            type="text"
            class="form-control"
            placeholder="Quantit&#233;"
            formControlName="quantite"
            [class.is-invalid]="licences.at(i).get('quantite')?.invalid && (licences.at(i).get('quantite')?.dirty || licences.at(i).get('quantite')?.touched)"
          />
          <app-field-error [control]="licences.at(i).get('quantite')" field="quantity"></app-field-error>
        </div>
        <div class="licence-field-stack"><input
          type="date"
          class="form-control"
          formControlName="dateEx" [class.is-invalid]="licences.at(i).get('dateEx')?.invalid && (licences.at(i).get('dateEx')?.dirty || licences.at(i).get('dateEx')?.touched)" /><app-field-error [control]="licences.at(i).get('dateEx')"></app-field-error></div>
        <button
          type="button"
          class="btn btn-danger"
          (click)="removeLicence(i)"
          *ngIf="licences.length > 1"
        >
          ×
        </button>
      </div>
      <button type="button" class="md-btn-icon md-btn-add" (click)="addLicence()" title="Ajouter une licence" style="margin-top: 0.75rem;">
        <i class="fas fa-plus"></i>
      </button>
    </div>
  </div>

  <!-- Row: Vis-a-vis client + N telephone -->
  <div class="form-row">
    <div class="form-group">
      <label for="nomDuContact" class="form-label">
        Vis-&#224;-vis client
        <span class="badge-autofill" *ngIf="fortinetForm.get('nomDuContact')?.value">Auto</span>
      </label>
      <input
        type="text"
        id="nomDuContact"
        class="form-control"
        formControlName="nomDuContact"
        placeholder="Auto-rempli depuis le client"
      />
    </div>

    <div class="form-group">
      <label for="numero" class="form-label">
        Num&#233;ro de t&#233;l&#233;phone
        <span class="badge-autofill" *ngIf="fortinetForm.get('numero')?.value">Auto</span>
      </label>
      <div class="form-field-stack">
      <input
        type="text"
        id="numero"
        class="form-control"
        formControlName="numero"
        placeholder="Auto-rempli depuis le client"

        appNumbersOnly maxlength="8"
        [class.is-invalid]="fortinetForm.get('numero')?.invalid && (fortinetForm.get('numero')?.dirty || fortinetForm.get('numero')?.touched)"
      />
      <app-field-error [control]="fortinetForm.get('numero')" field="phone"></app-field-error>
      </div>
    </div>
  </div>

  <!-- Row: Email client + Email commercial -->
  <div class="form-row">
    <div class="form-group">
      <label for="adresseEmailContact" class="form-label">
        Email client
        <span class="badge-autofill" *ngIf="fortinetForm.get('adresseEmailContact')?.value">Auto</span>
      </label>
      <input
        type="email"
        id="adresseEmailContact"
        class="form-control"
        formControlName="adresseEmailContact"
        placeholder="Auto-rempli depuis le client"
      />
      <div *ngIf="fortinetForm.get('adresseEmailContact')?.touched && fortinetForm.get('adresseEmailContact')?.invalid" class="text-danger">
        Veuillez entrer une adresse email valide.
      </div>
    </div>

    <div class="form-group">
      <label for="mailAdmin" class="form-label">Email commercial</label>
      <input type="email" id="mailAdmin" formControlName="mailAdmin" class="form-control" placeholder="Email commercial" />
    </div>
  </div>

  <!-- CC Mail -->
  <div class="form-group">
    <label>Emails en copie (CC)</label>
    <div *ngIf="fortinetForm.get('ccMail') as cc">
      <div [formArrayName]="'ccMail'">
        <div *ngFor="let control of cc.controls; let i = index" class="cc-email-row">
          <input
            [formControlName]="i"
            type="email"
            class="form-control"
            placeholder="Email en copie"
          />
          <button type="button" class="md-btn-icon md-btn-remove" (click)="removeCcMail(i)" title="Supprimer">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
    </div>
    <button type="button" class="md-btn-icon md-btn-add" (click)="addCcMail()" title="Ajouter un email" style="margin-top: 0.75rem;">
      <i class="fas fa-plus"></i>
    </button>
  </div>

  <!-- Remarque -->
  <div class="form-group">
    <label for="remarque" class="form-label">Remarque</label>
    <textarea
      id="remarque"
      class="form-control"
      formControlName="remarque"
      placeholder="Ajouter une remarque"
      rows="3"
    ></textarea>
  </div>

  <!-- Sous Contrat -->
  <div class="form-group form-check">
    <input type="checkbox" id="sousContrat" class="form-check-input" formControlName="sousContrat" />
    <label for="sousContrat" class="form-check-label">Sous Contrat</label>
  </div>

  <!-- Section Upload de Fichier -->
  <div class="form-group">
    <label class="form-label"><strong>📎 Fichier attach&#233;</strong></label>
    <div class="file-input-wrapper">
      <input 
        type="file" 
        id="ficheInput"
        (change)="onFileSelected($event)"
        #fileInput
      />
      <label for="ficheInput" class="file-input-label">
        <span><i class="fas fa-cloud-upload-alt"></i> Cliquez ou d&#233;posez un fichier</span>
      </label>
    </div>
    <small class="text-muted">
      <i class="fa fa-info-circle"></i> Le fichier sera upload&#233; apr&#232;s la cr&#233;ation du produit.
    </small>
    
    <!-- Message de succès/erreur -->
    <div *ngIf="uploadMessage" class="mt-2">
      <div [class]="uploadSuccess ? 'alert alert-success' : 'alert alert-danger'">
        <i [class]="uploadSuccess ? 'fa fa-check-circle' : 'fa fa-exclamation-circle'"></i>
        {{ uploadMessage }}
      </div>
    </div>
  </div>

  <!-- Commande Passer Par -->
  <div class="form-group">
    <label for="commandePasserPar" class="form-label">Commande Passer Par</label>
    <select id="commandePasserPar" formControlName="commandePasserPar" class="form-control">
      <option *ngFor="let option of commandePasserParOptions" [value]="option.value">
        {{ option.label }}
      </option>
    </select>
  <app-field-error [control]="fortinetForm.get('commandePasserPar')"></app-field-error></div>

  <!-- Form Buttons -->
  <div class="form-buttons">
    <button type="submit" class="btn btn-primary">
      <i class="fas fa-plus me-2"></i>Ajouter
    </button>
    <button type="button" class="btn btn-secondary" (click)="resetForm()">
      <i class="fas fa-redo me-2"></i>R&#233;initialiser
    </button>
  </div>
</form>
