<ng-container *ngIf="!hideFab">
  <!-- Pas de voile plein écran : l’utilisateur peut cliquer sur le reste de l’app pendant que le chat est ouvert. -->

  <aside
    class="assistant-fab-messenger"
    *ngIf="panelOpen"
    role="dialog"
    aria-labelledby="assistant-fab-title">
    <div class="assistant-fab-messenger__header">
      <h2 id="assistant-fab-title" class="assistant-fab-messenger__title">Assistant</h2>
      <button type="button" class="assistant-fab-close" (click)="closePanel()" aria-label="Fermer">
        ×
      </button>
    </div>
    <div class="assistant-fab-messenger__body">
      <app-assistant-chat variant="embedded"></app-assistant-chat>
    </div>
  </aside>

  <button
    type="button"
    class="assistant-fab-trigger"
    (click)="togglePanel()"
    [attr.aria-expanded]="panelOpen"
    aria-haspopup="dialog"
    aria-label="Ouvrir l’assistant">
    <svg class="assistant-fab-trigger__icon" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
      <path
        fill="#ffffff"
        d="M14 11h22c2.21 0 4 1.79 4 4v14c0 2.21-1.79 4-4 4h-11.5l-7.5 6.5v-6.5H14c-2.21 0-4-1.79-4-4V15c0-2.21 1.79-4 4-4z" />
      <path
        fill="none"
        stroke="#FB8C00"
        stroke-width="2"
        stroke-linecap="round"
        d="M19 26c2.2 2.6 7.8 2.6 10 0" />
    </svg>
  </button>
</ng-container>
