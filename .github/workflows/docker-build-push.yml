name: CI/CD Build, test and deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'projet2024/**'
      - 'light-bootstrap-dashboard-angular2-master/**'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - '.github/workflows/docker-build-push.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'projet2024/**'
      - 'light-bootstrap-dashboard-angular2-master/**'
      - '.github/workflows/docker-build-push.yml'
  workflow_dispatch:

env:
  BACKEND_IMAGE: sarahmhadhbi/gestion-licences-backend
  FRONTEND_IMAGE: sarahmhadhbi/gestion-licences-frontend

jobs:
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image tag
        id: tag
        run: echo "tag=sha-$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./projet2024
          push: false
          load: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Save backend image tarball
        run: |
          docker save \
            "${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}" \
            "${{ env.BACKEND_IMAGE }}:latest" \
            -o "${{ runner.temp }}/backend-image.tar"

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: ${{ runner.temp }}/backend-image.tar
          retention-days: 1

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image tag
        id: tag
        run: echo "tag=sha-$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./light-bootstrap-dashboard-angular2-master
          push: false
          load: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Save frontend image tarball
        run: |
          docker save \
            "${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}" \
            "${{ env.FRONTEND_IMAGE }}:latest" \
            -o "${{ runner.temp }}/frontend-image.tar"

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: ${{ runner.temp }}/frontend-image.tar
          retention-days: 1

  test-backend:
    name: Tests backend (Maven)
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projet2024
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit and integration tests
        run: mvn -B test

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: projet2024/target/surefire-reports/
          retention-days: 7

  test-frontend:
    name: Tests frontend (Karma)
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: light-bootstrap-dashboard-angular2-master
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run unit tests (ChromeHeadless)
        run: npm run test:ci

  push:
    name: Push Docker Hub
    needs: [build-backend, build-frontend, test-backend, test-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: ${{ runner.temp }}/images

      - name: Download frontend image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: ${{ runner.temp }}/images

      - name: Load images into Docker
        run: |
          docker load -i "${{ runner.temp }}/images/backend-image.tar"
          docker load -i "${{ runner.temp }}/images/frontend-image.tar"
          docker images | grep gestion-licences

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push backend tags
        run: |
          docker push "${{ env.BACKEND_IMAGE }}:${{ needs.build-backend.outputs.image_tag }}"
          docker push "${{ env.BACKEND_IMAGE }}:latest"

      - name: Push frontend tags
        run: |
          docker push "${{ env.FRONTEND_IMAGE }}:${{ needs.build-backend.outputs.image_tag }}"
          docker push "${{ env.FRONTEND_IMAGE }}:latest"

      - name: Summary
        run: |
          echo "Build + tests OK — images poussées :"
          echo "  ${{ env.BACKEND_IMAGE }}:${{ needs.build-backend.outputs.image_tag }}"
          echo "  ${{ env.BACKEND_IMAGE }}:latest"
          echo "  ${{ env.FRONTEND_IMAGE }}:${{ needs.build-backend.outputs.image_tag }}"
          echo "  ${{ env.FRONTEND_IMAGE }}:latest"

  deploy:
    name: Deploy VM SOC
    needs: [push, build-backend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, vm-soc]
    env:
      DEPLOY_DIR: /home/srv-app
      IMAGE_TAG: ${{ needs.build-backend.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Compose files to VM
        run: |
          mkdir -p "${DEPLOY_DIR}/uploads"
          cp docker-compose.yml docker-compose.prod.yml "${DEPLOY_DIR}/"

      - name: Pull and start containers
        working-directory: /home/srv-app
        run: |
          export IMAGE_TAG="${IMAGE_TAG}"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend frontend
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --remove-orphans
          docker compose ps

      - name: Smoke test
        run: |
          sleep 15
          curl -sf --max-time 30 http://127.0.0.1:8089/ >/dev/null \
            || curl -sf --max-time 30 -o /dev/null -w "%{http_code}\n" http://127.0.0.1:8089/ \
            || echo "Vérifier : docker logs spring-backend"
