<form [formGroup]="ciscoForm" (ngSubmit)="saveCisco()" class="form-wrapper">
  <h5 class="form-title mb-4">{{ isEditing ? 'Modifier licence Cisco' : 'Ajouter licence Cisco' }}</h5>

  <div class="form-group client-select-wrapper" style="position: relative; z-index: 10000;">
    <label for="client-cs" class="form-label">Client</label>
    <app-searchable-client-select #clientSelect formControlName="client" [clients]="clients"></app-searchable-client-select>
    <app-field-error [control]="ciscoForm.get('client')"></app-field-error>
  </div>

  <div class="form-group">
    <label class="form-label">Licences</label>
    <div formArrayName="licences">
      <div *ngFor="let licence of licences.controls; let i = index" [formGroupName]="i" class="licence-row">
        <div class="licence-field-stack"><input type="text" class="form-control" placeholder="Nom de licence" formControlName="nomDesLicences" [class.is-invalid]="licences.at(i).get('nomDesLicences')?.invalid && (licences.at(i).get('nomDesLicences')?.dirty || licences.at(i).get('nomDesLicences')?.touched)" /><app-field-error [control]="licences.at(i).get('nomDesLicences')"></app-field-error></div>
        <div class="licence-field-stack">
        <input type="text" class="form-control" placeholder="Quantité" formControlName="quantite"
        [class.is-invalid]="licences.at(i).get('quantite')?.invalid && (licences.at(i).get('quantite')?.dirty || licences.at(i).get('quantite')?.touched)"
          />
        <app-field-error [control]="licences.at(i).get('quantite')" field="quantity"></app-field-error>
        </div>
        <div class="licence-field-stack"><input type="date" class="form-control" formControlName="dateEx" [class.is-invalid]="licences.at(i).get('dateEx')?.invalid && (licences.at(i).get('dateEx')?.dirty || licences.at(i).get('dateEx')?.touched)" /><app-field-error [control]="licences.at(i).get('dateEx')"></app-field-error></div>
        <button type="button" class="btn btn-danger" (click)="removeLicence(i)" *ngIf="licences.length > 1">×</button>
      </div>
      <button type="button" class="md-btn-icon md-btn-add" (click)="addLicence()" title="Ajouter une licence" style="margin-top: 0.75rem;">
        <i class="fas fa-plus"></i>
      </button>
    </div>
  </div>

  <div class="form-group">
    <label for="duree-cs" class="form-label">Durée de la licence</label>
    <input type="text" id="duree-cs" class="form-control" formControlName="dureeDeLicence" placeholder="Durée de la licence" />
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="contact-cs" class="form-label">
        Vis-à-vis client
        <span class="badge-autofill" *ngIf="ciscoForm.get('nomDuContact')?.value">Auto</span>
      </label>
      <input type="text" id="contact-cs" class="form-control" formControlName="nomDuContact" placeholder="Auto-rempli depuis le client" />
    </div>
    <div class="form-group">
      <label for="tel-cs" class="form-label">
        Numéro de téléphone
        <span class="badge-autofill" *ngIf="ciscoForm.get('numero')?.value">Auto</span>
      </label>
      <div class="form-field-stack">
      <input type="text" id="tel-cs" class="form-control" formControlName="numero" placeholder="Auto-rempli depuis le client"
        appNumbersOnly maxlength="8"
        [class.is-invalid]="ciscoForm.get('numero')?.invalid && (ciscoForm.get('numero')?.dirty || ciscoForm.get('numero')?.touched)"
      />
      <app-field-error [control]="ciscoForm.get('numero')" field="phone"></app-field-error>
      </div>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="email-cs" class="form-label">
        Email client
        <span class="badge-autofill" *ngIf="ciscoForm.get('adresseEmailContact')?.value">Auto</span>
      </label>
      <input type="email" id="email-cs" class="form-control" formControlName="adresseEmailContact" placeholder="Auto-rempli depuis le client" />
      <div *ngIf="ciscoForm.get('adresseEmailContact')?.touched && ciscoForm.get('adresseEmailContact')?.invalid" class="text-danger">
        Veuillez entrer une adresse email valide.
      </div>
    </div>
    <div class="form-group">
      <label for="commercial-cs" class="form-label">Email commercial</label>
      <input type="email" id="commercial-cs" formControlName="mailAdmin" class="form-control" placeholder="Email commercial" />
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Emails en copie (CC)</label>
    <div [formArrayName]="'ccMail'">
      <div *ngFor="let control of ccMail.controls; let i = index" class="cc-email-row">
        <input [formControlName]="i" type="email" class="form-control" placeholder="Email en copie" />
        <button type="button" class="md-btn-icon md-btn-remove" (click)="removeCcMail(i)" title="Supprimer">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
    <button type="button" class="md-btn-icon md-btn-add" (click)="addCcMail()" title="Ajouter un email" style="margin-top: 0.75rem;">
      <i class="fas fa-plus"></i>
    </button>
  </div>

  <div class="form-group">
    <label for="rem-cs" class="form-label">Remarque</label>
    <textarea id="rem-cs" class="form-control" formControlName="remarque" placeholder="Remarque" rows="3"></textarea>
  </div>

  <div class="form-group form-check">
    <input type="checkbox" id="sous-cs" class="form-check-input" formControlName="sousContrat" />
    <label for="sous-cs" class="form-check-label">Sous contrat</label>
  </div>

  <div class="form-group">
    <label for="cmd-cs" class="form-label">Commande passer par</label>
    <select id="cmd-cs" formControlName="commandePasserPar" class="form-control">
      <option *ngFor="let option of commandePasserParOptions" [value]="option.value">{{ option.label }}</option>
    </select>
  <app-field-error [control]="ciscoForm.get('commandePasserPar')"></app-field-error></div>

  <div class="form-group" *ngIf="isEditing && ciscoToEdit?.fichier">
    <label class="form-label">Fichier actuel</label>
    <div class="d-flex align-items-center gap-2 flex-wrap">
      <a [href]="getFileDownloadUrl()" target="_blank" class="btn btn-sm btn-outline-primary">
        <i class="fa fa-download"></i> {{ ciscoToEdit?.fichierOriginalName || 'Télécharger' }}
      </a>
      <button type="button" class="btn btn-sm btn-danger" (click)="deleteExistingFile()">Supprimer le fichier</button>
    </div>
  </div>

  <div class="form-group">
    <label for="fichier-Cisco" class="form-label">{{ isEditing ? 'Nouveau fichier (optionnel)' : 'Fichier (PDF, DOC, etc.)' }}</label>
    <input type="file" id="fichier-Cisco" class="form-control" (change)="onFileSelected($event)" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.png,.jpg,.jpeg" />
    <small class="text-muted">Le fichier sera uploadé après l'enregistrement</small>
  </div>

  <div class="form-buttons">
    <button type="submit" class="btn btn-primary">
      <i class="fas" [class.fa-save]="isEditing" [class.fa-plus]="!isEditing"></i>
      {{ isEditing ? 'Enregistrer' : 'Ajouter' }}
    </button>
    <button type="button" class="btn btn-secondary" (click)="onReinitialiser()">Réinitialiser</button>
  </div>
</form>
