### CONTEXT & PORT ###
server.servlet.context-path=/
server.port=8089

# URL de l'application Angular (lien de vérification e-mail). Surcharge : APP_FRONTEND_BASE_URL
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}

### JWT SECURITY ###
app.jwtSecret=CetteCleSuperSecreteEtTresLongueAvecAuMoins64Caracteres_1234567890abcdef
app.jwtExpirationMs=86400000

# Google Sign-In (ID client Web, finissant par .apps.googleusercontent.com).
# Option A — variable d’environnement : GOOGLE_OAUTH_CLIENT_IDS
# Option B — fichier local (recommandé en dev) : copiez application-google.local.properties.example
#           vers application-google.local.properties (même dossier) et renseignez l’ID.
# Console Google : https://console.cloud.google.com/apis/credentials  (type « Application Web »)
# Origines JavaScript autorisées : http://localhost:4200
google.oauth.client-ids=${GOOGLE_OAUTH_CLIENT_IDS:}

# Configuration MULTIPART ESSENTIELLE
# CONFIGURATION UPLOAD
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB


### MAIL CONFIGURATION ###
# Expéditeur des mails automatiques (vérification compte, mot de passe, etc.) :
# gerinfo2025@gmail.com — mot de passe d'application Gmail (16 car., SANS espaces).
# Les utilisateurs s'inscrivent avec leur @geranceinformatique.com ; ils REÇOIVENT le mail, ils n'envoient pas depuis ce compte.
# Mot de passe : application-mail.local.properties (PC) ou variable SPRING_MAIL_PASSWORD (Docker)
# Ne pas mettre spring.mail.password= ici (vide) : cela écrasait le fichier local.
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:gerinfo2025@gmail.com}

spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_SMTP_SSL:false}
spring.mail.properties.mail.smtp.ssl.trust=${spring.mail.host}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Affiche le lien de vérification dans les logs serveur (utile si l'e-mail n'arrive pas)
app.mail.log-verification-link=${APP_MAIL_LOG_LINK:true}

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http.converter.json=DEBUG

### JACKSON DATE FORMAT ###
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

### Assistant / LLM local (Ollama — gratuit, aucune clé API)
# Modèle = exactement une ligne de `ollama list` sur la MÊME machine que base-url (ex. mistral:latest).
# Backend en JAR sur le PC : base-url=http://127.0.0.1:11434. Backend en Docker (Windows/Mac) : http://host.docker.internal:11434
# Sinon « model not found » alors que `ollama list` est plein sur le PC = Spring parlait au mauvais hôte (127.0.0.1 = conteneur vide).
assistant.ollama.enabled=true
assistant.ollama.base-url=http://127.0.0.1:11434
assistant.ollama.model=mistral:latest
# true = reformulation Ollama par défaut. false = données brutes (rapide). Décochez dans l’UI pour désactifier par envoi.
assistant.ollama.rephrase-default=true
# Délais HTTP vers Ollama (évite d’attendre indéfiniment si le modèle ne répond pas)
assistant.ollama.connect-timeout-ms=30000
# 1200000 ms = 20 min (chatbot / VM lente). Surcharge : ASSISTANT_OLLAMA_READ_TIMEOUT_MS
assistant.ollama.read-timeout-ms=1200000
# Taille max du bloc FACTS envoyé à Ollama (prompt trop long = échec silencieux ou timeout)
assistant.ollama.max-facts-chars=28000

### Import ESET (analyse PDF / TXT avant formulaire) ###
# OCR pour PDF scannés : installer Tesseract (Windows : https://github.com/UB-Mannheim/tesseract/wiki )
# puis renseigner le dossier tessdata (contient eng.traineddata, fra.traineddata, …).
eset.import.ocr.enabled=false
eset.import.ocr.tessdata-path=
# Ex. eng, fra, ou fra+eng (fichiers .traineddata requis dans tessdata-path)
eset.import.ocr.language=eng
eset.import.ocr.max-pages=10
eset.import.ocr.render-dpi=200

# Import ESET → Ollama (temps de réponse : réduire max-prompt-chars accélère ; augmenter read-timeout si timeout)
# max-prompt-chars 0 = même limite que assistant.ollama.max-facts-chars
eset.import.ollama.max-prompt-chars=12000
# VM / CPU faible : 1200000 ms = 20 min (surcharge : ESET_IMPORT_OLLAMA_READ_TIMEOUT_MS)
eset.import.ollama.read-timeout-ms=1200000

# Laisser le navigateur attendre la réponse analyse ESET (doit être >= délai Ollama ci-dessus)
server.tomcat.connection-timeout=1200000

# Fichiers locaux en dernier (mot de passe Gmail, OAuth Google) — ne pas écraser après
spring.config.import=optional:classpath:application-google.local.properties,optional:classpath:application-mail.local.properties
