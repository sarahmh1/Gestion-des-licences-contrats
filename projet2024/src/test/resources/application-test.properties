# Profil test — base H2 en mémoire (pas besoin de MySQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

app.jwtSecret=CetteCleSuperSecreteEtTresLongueAvecAuMoins64Caracteres_1234567890abcdef
app.jwtExpirationMs=86400000

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@example.com
spring.mail.password=test

google.oauth.client-ids=

# Pas d'Ollama / OCR / mail réel en CI
assistant.ollama.enabled=false
assistant.ollama.base-url=http://127.0.0.1:9
eset.import.ocr.enabled=false

spring.task.scheduling.enabled=false
logging.level.root=WARN
logging.level.org.springframework=WARN
