services:
  # 1. Database Service
  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: geranceee
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2. Ollama — image officielle (pas de push 3 Go sur Docker Hub)
  # Après le 1er démarrage : scripts\ollama-pull-model.cmd  (ou sur VM : bash scripts/ollama-pull-model.sh)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # 3. Backend Service (build local = code à jour, ex. POST /Eset/import/analyze)
  backend:
    build:
      context: ./projet2024
      dockerfile: Dockerfile
    image: gestion-licences-backend:local
    container_name: spring-backend
    restart: always
    ports:
      - "8089:8089"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/geranceee?createDatabaseIfNotExist=true&useUnicode=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      ASSISTANT_OLLAMA_ENABLED: "true"
      # Backend + Ollama dans le même compose (PC ou VM Linux) :
      ASSISTANT_OLLAMA_BASE_URL: "http://ollama:11434"
      ASSISTANT_OLLAMA_MODEL: "mistral:latest"
      # Délais : VM souvent plus lente que le PC (import ESET / Mistral)
      ASSISTANT_OLLAMA_CONNECT_TIMEOUT_MS: "30000"
      # 20 min — VM lente / Mistral (sans rebuild : mêmes variables dans le compose de la VM)
      ASSISTANT_OLLAMA_READ_TIMEOUT_MS: "1200000"
      ESET_IMPORT_OLLAMA_READ_TIMEOUT_MS: "1200000"
      ESET_IMPORT_OLLAMA_MAX_PROMPT_CHARS: "12000"
      SERVER_TOMCAT_CONNECTION_TIMEOUT: "1200000"
      # Lien « vérifier mon compte » dans l'e-mail (adapter l'IP VM si besoin)
      APP_FRONTEND_BASE_URL: "${APP_FRONTEND_BASE_URL:-http://192.168.1.50:4200}"
      APP_MAIL_LOG_LINK: "${APP_MAIL_LOG_LINK:-true}"
    volumes:
      - ./projet2024/uploads:/app/uploads
    depends_on:
      - db
      - ollama

  # 4. Frontend Service
  frontend:
    image: sarahmhadhbi/gestion-licences-frontend:v10
    container_name: angular-frontend
    restart: always
    ports:
      - "4200:80"   # Access the app at http://localhost:4200
    depends_on:
      - backend

volumes:
  db_data:
  ollama_data: