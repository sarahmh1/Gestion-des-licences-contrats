<form [formGroup]="fortraForm" (ngSubmit)="addFortra()" class="form-wrapper">
  <h5 class="form-title mb-4">{{ isEditing ? 'Modifier licence Fortra' : 'Ajouter licence Fortra' }}</h5>

  <div class="form-group client-select-wrapper" style="position: relative; z-index: 10000;">
    <label for="client-fortra" class="form-label">Client</label>
    <app-searchable-client-select
      #clientSelect
      formControlName="client"
      [clients]="clients">
    </app-searchable-client-select>
    <app-field-error [control]="fortraForm.get('client')"></app-field-error>
  </div>

  <div class="form-group">
    <label class="form-label">Licences</label>
    <div formArrayName="licences">
      <div *ngFor="let licence of licences.controls; let i = index" [formGroupName]="i" class="licence-row">
        <div class="licence-field-stack"><input type="text" class="form-control" placeholder="Nom de licence" formControlName="nomDesLicences" [class.is-invalid]="licences.at(i).get('nomDesLicences')?.invalid && (licences.at(i).get('nomDesLicences')?.dirty || licences.at(i).get('nomDesLicences')?.touched)" /><app-field-error [control]="licences.at(i).get('nomDesLicences')"></app-field-error></div>
        <div class="licence-field-stack">
        <input type="text" class="form-control" placeholder="Quantité" formControlName="quantite"
        [class.is-invalid]="licences.at(i).get('quantite')?.invalid && (licences.at(i).get('quantite')?.dirty || licences.at(i).get('quantite')?.touched)"
          />
        <app-field-error [control]="licences.at(i).get('quantite')" field="quantity"></app-field-error>
        </div>
        <div class="licence-field-stack"><input type="date" class="form-control" formControlName="dateEx" [class.is-invalid]="licences.at(i).get('dateEx')?.invalid && (licences.at(i).get('dateEx')?.dirty || licences.at(i).get('dateEx')?.touched)" /><app-field-error [control]="licences.at(i).get('dateEx')"></app-field-error></div>
        <button type="button" class="btn btn-danger" (click)="removeLicence(i)" *ngIf="licences.length > 1">×</button>
      </div>
      <button type="button" class="md-btn-icon md-btn-add" (click)="addLicence()" title="Ajouter une licence" style="margin-top: 0.75rem;">
        <i class="fas fa-plus"></i>
      </button>
    </div>
  </div>

  <div class="form-group">
    <label for="duree-fortra" class="form-label">Durée de la licence</label>
    <input type="text" id="duree-fortra" class="form-control" formControlName="dureeDeLicence" placeholder="Durée de la licence" />
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="contact-fortra" class="form-label">
        Vis-à-vis client
        <span class="badge-autofill" *ngIf="fortraForm.get('nomDuContact')?.value">Auto</span>
      </label>
      <input type="text" id="contact-fortra" class="form-control" formControlName="nomDuContact" placeholder="Auto-rempli depuis le client" />
    </div>

    <div class="form-group">
      <label for="numero-fortra" class="form-label">
        Numéro de téléphone
        <span class="badge-autofill" *ngIf="fortraForm.get('numero')?.value">Auto</span>
      </label>
      <div class="form-field-stack">
      <input type="text" id="numero-fortra" class="form-control" formControlName="numero" placeholder="Auto-rempli depuis le client"
        appNumbersOnly maxlength="8"
        [class.is-invalid]="fortraForm.get('numero')?.invalid && (fortraForm.get('numero')?.dirty || fortraForm.get('numero')?.touched)"
      />
      <app-field-error [control]="fortraForm.get('numero')" field="phone"></app-field-error>
      </div>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="email-cli-fortra" class="form-label">
        Email client
        <span class="badge-autofill" *ngIf="fortraForm.get('adresseEmailContact')?.value">Auto</span>
      </label>
      <input type="email" id="email-cli-fortra" class="form-control" formControlName="adresseEmailContact" placeholder="Auto-rempli depuis le client" />
      <div *ngIf="fortraForm.get('adresseEmailContact')?.touched && fortraForm.get('adresseEmailContact')?.invalid" class="text-danger">
        Veuillez entrer une adresse email valide.
      </div>
    </div>

    <div class="form-group">
      <label for="mail-admin-fortra" class="form-label">Email commercial</label>
      <input type="email" id="mail-admin-fortra" formControlName="mailAdmin" class="form-control" placeholder="Email commercial" />
    </div>
  </div>

  <div class="form-group">
    <label>Emails en copie (CC)</label>
    <div [formArrayName]="'ccMail'">
      <div *ngFor="let control of ccMail.controls; let i = index" class="cc-email-row">
        <input [formControlName]="i" type="email" class="form-control" placeholder="Email en copie" />
        <button type="button" class="md-btn-icon md-btn-remove" (click)="removeCcMail(i)" title="Supprimer">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
    <button type="button" class="md-btn-icon md-btn-add" (click)="addCcMail()" title="Ajouter un email" style="margin-top: 0.75rem;">
      <i class="fas fa-plus"></i>
    </button>
  </div>

  <div class="form-group">
    <label for="remarque-fortra" class="form-label">Remarque</label>
    <textarea id="remarque-fortra" class="form-control" formControlName="remarque" placeholder="Remarque" rows="3"></textarea>
  </div>

  <div class="form-group form-check">
    <input type="checkbox" id="sousContrat-fortra" class="form-check-input" formControlName="sousContrat" />
    <label for="sousContrat-fortra" class="form-check-label">Sous Contrat</label>
  </div>

  <div class="form-group">
    <label for="commande-fortra" class="form-label">Commande Passer Par</label>
    <select id="commande-fortra" formControlName="commandePasserPar" class="form-control">
      <option *ngFor="let option of commandePasserParOptions" [value]="option.value">{{ option.label }}</option>
    </select>
  <app-field-error [control]="fortraForm.get('commandePasserPar')"></app-field-error></div>

  <div class="form-group">
    <label for="fichier-fortra" class="form-label">Fichier (PDF, DOC, etc.)</label>
    <input type="file" id="fichier-fortra" class="form-control" (change)="onFileSelected($event)" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.png,.jpg,.jpeg" />
    <small class="text-muted">Le fichier sera uploadé après l'enregistrement</small>
  </div>

  <div class="form-buttons">
    <button type="submit" class="btn btn-primary">
      <i class="fas" [class.fa-save]="isEditing" [class.fa-plus]="!isEditing"></i>
      {{ isEditing ? 'Enregistrer' : 'Ajouter' }}
    </button>
    <button type="button" class="btn btn-secondary" (click)="onReinitialiser()">Réinitialiser</button>
  </div>
</form>
