<form [formGroup]="PaloForm" (ngSubmit)="addPalo()" class="form-wrapper">
  <h5 class="form-title mb-4">{{ isEditing ? 'Modifier licence Paloalto' : 'Ajouter licence Paloalto' }}</h5>
  
  <!-- Client -->
  <div class="form-group client-select-wrapper" style="position: relative; z-index: 10000;">
    <label for="client" class="form-label">Client</label>
    <app-searchable-client-select 
      #clientSelect
      formControlName="client" 
      [clients]="clients">
    </app-searchable-client-select>
    <app-field-error [control]="PaloForm.get('client')"></app-field-error>
  </div>

    <!-- Nom du Boîtier -->
    <div class="form-group mb-3">
      <label for="nomDuBoitier" class="form-label">Nom du Boîtier</label>
      <input
        type="text"
        id="nomDuBoitier"
        class="form-control"
        formControlName="nomDuBoitier"
        placeholder="Nom du boîtier"
      />
      <app-field-error [control]="PaloForm.get('nomDuBoitier')"></app-field-error>
    </div>
<!-- Licences -->
<div formArrayName="licences">
  <label class="form-label">Licences</label>
  <div
    *ngFor="let licence of licences.controls; let i = index"
    [formGroupName]="i"
    class="row align-items-end mb-2"
  >
    <div class="col-md-4">
      <div class="licence-field-stack"><input
        type="text"
        class="form-control"
        placeholder="Nom de licence"
        formControlName="nomDesLicences" [class.is-invalid]="licences.at(i).get('nomDesLicences')?.invalid && (licences.at(i).get('nomDesLicences')?.dirty || licences.at(i).get('nomDesLicences')?.touched)" /><app-field-error [control]="licences.at(i).get('nomDesLicences')"></app-field-error></div>
    </div>
    <div class="col-md-3">
      <div class="licence-field-stack">
        <input
          type="text"
          class="form-control"
          placeholder="quantité"
          formControlName="quantite"
          [class.is-invalid]="licences.at(i).get('quantite')?.invalid && (licences.at(i).get('quantite')?.dirty || licences.at(i).get('quantite')?.touched)"
          />
        <app-field-error [control]="licences.at(i).get('quantite')" field="quantity"></app-field-error>
      </div>
    </div>
    <div class="col-md-4">
      <div class="licence-field-stack"><input
        type="date"
        class="form-control"
        formControlName="dateEx" [class.is-invalid]="licences.at(i).get('dateEx')?.invalid && (licences.at(i).get('dateEx')?.dirty || licences.at(i).get('dateEx')?.touched)" /><app-field-error [control]="licences.at(i).get('dateEx')"></app-field-error></div>
    </div>
    <div class="col-md-1">
      <button
        type="button"
        class="btn btn-danger"
        (click)="removeLicence(i)"
        *ngIf="licences.length > 1"
      >
        ×
      </button>
    </div>
  </div>
  <button type="button" class="md-btn-icon md-btn-add" (click)="addLicence()" title="Ajouter une licence" style="margin-top: 0.75rem;">
    <i class="fas fa-plus"></i>
  </button>
</div>

    <!-- Numéro de Série -->
    <div class="form-group mb-3">
      <label for="numeroSerieBoitier" class="form-label">Numéro de Série</label>
      <input
        type="text"
        id="numeroSerieBoitier"
        class="form-control"
        formControlName="numeroSerieBoitier"
        placeholder="Numéro de série"
      />
      <app-field-error [control]="PaloForm.get('numeroSerieBoitier')"></app-field-error>
    </div>

    

        <!-- Durée de la Licence -->
    <div class="form-group mb-3">
      <label for="dureeDeLicence" class="form-label">Durée de la Licence</label>
      <input
        type="text"
        id="dureeDeLicence"
        class="form-control"
        formControlName="dureeDeLicence"
        placeholder="Durée de la licence"
      />
    </div>

    <!-- Nom du Contact -->
    <div class="form-group mb-3">
      <label for="nomDuContact" class="form-label">
        Vis-&#224;-vis client
        <span class="badge-autofill" *ngIf="PaloForm.get('nomDuContact')?.value">Auto</span>
      </label>
      <input
        type="text"
        id="nomDuContact"
        class="form-control"
        formControlName="nomDuContact"
        placeholder="Auto-rempli depuis le client"
      />
    </div>

<!-- Numéro -->
    <div class="form-group mb-3">
      <label for="numero" class="form-label">
        N&#176; t&#233;l&#233;phone
        <span class="badge-autofill" *ngIf="PaloForm.get('numero')?.value">Auto</span>
      </label>
      <div class="form-field-stack">
      <input
        type="text"
        id="numero"
        class="form-control"
        formControlName="numero"
        placeholder="Auto-rempli depuis le client"

        appNumbersOnly maxlength="8"
        [class.is-invalid]="PaloForm.get('numero')?.invalid && (PaloForm.get('numero')?.dirty || PaloForm.get('numero')?.touched)"
      />
      <app-field-error [control]="PaloForm.get('numero')" field="phone"></app-field-error>
      </div>
    </div>
    <!-- Adresse Email Contact -->
    <div class="form-group mb-3">
      <label for="adresseEmailContact" class="form-label">
        Email client
        <span class="badge-autofill" *ngIf="PaloForm.get('adresseEmailContact')?.value">Auto</span>
      </label>
      <input
        type="email"
        id="adresseEmailContact"
        class="form-control"
        formControlName="adresseEmailContact"
        placeholder="Auto-rempli depuis le client"
      />
      <div *ngIf="PaloForm.get('adresseEmailContact')?.touched && PaloForm.get('adresseEmailContact')?.invalid" class="text-danger">
        Veuillez entrer une adresse email valide.
      </div>
    </div>
    

      <!-- Email Admin -->
<div class="form-group mb-3">
  <label for="mailAdmin" class="form-label">Email commercial</label>
  <input type="email" id="mailAdmin" formControlName="mailAdmin" class="form-control" placeholder="Email de l'administrateur" />
</div>
<!-- CC Mail -->
<div class="form-group mb-3">
  <label>Emails en copie (CC)</label>
  <div *ngIf="PaloForm.get('ccMail') as cc">
    <div [formArrayName]="'ccMail'">
      <div *ngFor="let control of cc.controls; let i = index" class="d-flex mb-2">
        <input
          [formControlName]="i"
          type="email"
          class="form-control"
          placeholder="Email en copie"
        />
        <button type="button" class="md-btn-icon md-btn-remove" (click)="removeCcMail(i)" title="Supprimer cet email">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
  </div>
  <button type="button" class="md-btn-icon md-btn-add" (click)="addCcMail()" title="Ajouter un email" style="margin-top: 0.75rem;">
    <i class="fas fa-plus"></i>
  </button>
</div>
    <!-- Remarque -->
    <div class="form-group mb-3">
      <label for="remarque" class="form-label">Remarque</label>
      <textarea
        id="remarque"
        class="form-control"
        formControlName="remarque"
        placeholder="Ajouter une remarque"
      ></textarea>
    </div>
    <!-- Sous Contrat -->
      <div class="form-group mb-3 form-check">
        <input type="checkbox" id="sousContrat" class="form-check-input" formControlName="sousContrat" />
        <label for="sousContrat" class="form-check-label">Sous Contrat</label>
      </div>

    <!-- Section Upload de Fichier -->
    <div class="form-group mb-3">
      <label class="form-label"><strong>📎 Fichier attaché</strong></label>
      
      <!-- Fichier sélectionné -->
      <div *ngIf="selectedFile" class="alert alert-info mb-2">
        <i class="fa fa-file"></i> 
        <span class="ms-2">{{ selectedFile.name }}</span>
        <button type="button" class="btn btn-sm btn-danger ms-2" (click)="selectedFile = null">×</button>
      </div>

      <!-- Upload fichier -->
      <div class="input-group">
        <input 
          type="file" 
          class="form-control" 
          (change)="onFileSelected($event)"
          #fileInput
        />
      </div>
      <small class="text-muted">Le fichier sera uploadé après la création du Palo</small>

      <!-- Message de succès/erreur -->
      <div *ngIf="uploadMessage" class="mt-2">
        <div [class]="uploadSuccess ? 'alert alert-success' : 'alert alert-danger'">
          <i [class]="uploadSuccess ? 'fa fa-check-circle' : 'fa fa-exclamation-circle'"></i>
          {{ uploadMessage }}
        </div>
      </div>
    </div>
 

<div class="form-group">
        <label for="commandePasserPar">Commande Passer Par</label>
        <select id="commandePasserPar" formControlName="commandePasserPar" class="form-control">
          <option *ngFor="let option of commandePasserParOptions" [value]="option.value">
            {{ option.label }}
          </option>
        </select>
      <app-field-error [control]="PaloForm.get('commandePasserPar')"></app-field-error></div>
  



    <!-- Bouton Ajouter/Modifier -->
    <button type="submit" class="btn btn-primary">
      <i class="fas fa-check me-2"></i>{{ isEditing ? 'Modifier' : 'Ajouter' }}
    </button>
    <button type="button" class="btn btn-secondary ms-2" (click)="resetForm()">Réinitialiser</button>
    <button type="button" class="btn btn-outline-secondary ms-2" (click)="onCancel()">Annuler</button>
  </form>
