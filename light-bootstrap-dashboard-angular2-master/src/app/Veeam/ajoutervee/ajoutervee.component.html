<form [formGroup]="veeamForm" (ngSubmit)="addVeeam()" class="form-wrapper">
  <h5 class="form-title mb-4">Ajouter licence Veeam</h5>

  <div class="form-group mb-3">
    <label for="client" class="form-label">Client <span class="text-danger">*</span></label>
    <app-searchable-client-select #clientSelect formControlName="client" [clients]="clients"></app-searchable-client-select>
    <app-field-error [control]="veeamForm.get('client')"></app-field-error>
  </div>

  <div formArrayName="licences" class="mb-3">
    <label class="form-label">Licences <span class="text-danger">*</span></label>
    <div *ngFor="let licence of licences.controls; let i = index" [formGroupName]="i" class="row align-items-end mb-2">
      <div class="col-md-4">
        <div class="licence-field-stack"><input type="text" class="form-control" placeholder="Nom de licence *" formControlName="nomDesLicences" [class.is-invalid]="licences.at(i).get('nomDesLicences')?.invalid && (licences.at(i).get('nomDesLicences')?.dirty || licences.at(i).get('nomDesLicences')?.touched)" /><app-field-error [control]="licences.at(i).get('nomDesLicences')"></app-field-error></div>
      </div>
      <div class="col-md-3">
        <div class="licence-field-stack">
          <input type="text" class="form-control" placeholder="Quantit&#233; *" formControlName="quantite"
            [class.is-invalid]="licences.at(i).get('quantite')?.invalid && (licences.at(i).get('quantite')?.dirty || licences.at(i).get('quantite')?.touched)"
          />
          <app-field-error [control]="licences.at(i).get('quantite')" field="quantity"></app-field-error>
        </div>
      </div>
      <div class="col-md-4">
        <div class="licence-field-stack"><input type="date" class="form-control" formControlName="dateEx" [class.is-invalid]="licences.at(i).get('dateEx')?.invalid && (licences.at(i).get('dateEx')?.dirty || licences.at(i).get('dateEx')?.touched)" /><app-field-error [control]="licences.at(i).get('dateEx')"></app-field-error></div>
      </div>
      <div class="col-md-1">
        <button type="button" class="btn btn-danger" (click)="removeLicence(i)" *ngIf="licences.length > 1">&times;</button>
      </div>
    </div>
    <button type="button" class="btn btn-secondary mt-2" (click)="addLicence()">Ajouter une licence</button>
  </div>

  <div class="form-group mb-3">
    <label for="dureeDeLicence" class="form-label">Dur&#233;e de la licence <span class="text-danger">*</span></label>
    <input type="text" id="dureeDeLicence" class="form-control" formControlName="dureeDeLicence" placeholder="Ex: 12 mois" />
    <app-field-error [control]="veeamForm.get('dureeDeLicence')"></app-field-error>
  </div>

  <div class="form-group mb-3 form-check">
    <input type="checkbox" id="sousContrat" class="form-check-input" formControlName="sousContrat" />
    <label for="sousContrat" class="form-check-label">Sous contrat <span class="text-danger">*</span></label>
  </div>

  <div class="form-group mb-3">
    <label for="commandePasserPar" class="form-label">Commande pass&#233;e par <span class="text-danger">*</span></label>
    <select id="commandePasserPar" formControlName="commandePasserPar" class="form-control">
      <option *ngFor="let option of commandePasserParOptions" [value]="option.value">{{ option.label }}</option>
    </select>
  <app-field-error [control]="veeamForm.get('commandePasserPar')"></app-field-error></div>

  <div class="form-row">
    <div class="form-group">
      <label for="nomDuContact" class="form-label">
        Vis-&#224;-vis client
        <span class="badge-autofill" *ngIf="veeamForm.get('nomDuContact')?.value">Auto</span>
      </label>
      <input type="text" id="nomDuContact" class="form-control" formControlName="nomDuContact" placeholder="Auto-rempli depuis le client" />
    </div>
    <div class="form-group">
      <label for="numero" class="form-label">
        N&#176; t&#233;l&#233;phone
        <span class="badge-autofill" *ngIf="veeamForm.get('numero')?.value">Auto</span>
      </label>
      <div class="form-field-stack">
      <input type="text" id="numero" class="form-control" formControlName="numero" placeholder="Auto-rempli depuis le client"
        appNumbersOnly maxlength="8"
        [class.is-invalid]="veeamForm.get('numero')?.invalid && (veeamForm.get('numero')?.dirty || veeamForm.get('numero')?.touched)"
      />
      <app-field-error [control]="veeamForm.get('numero')" field="phone"></app-field-error>
      </div>
    </div>
  </div>

  <div class="form-group mb-3">
    <label for="adresseEmailContact" class="form-label">
      Email client
      <span class="badge-autofill" *ngIf="veeamForm.get('adresseEmailContact')?.value">Auto</span>
    </label>
    <input type="email" id="adresseEmailContact" class="form-control" formControlName="adresseEmailContact" placeholder="Auto-rempli depuis le client" />
    <div *ngIf="veeamForm.get('adresseEmailContact')?.touched && veeamForm.get('adresseEmailContact')?.invalid" class="text-danger">
      Veuillez entrer une adresse email valide.
    </div>
  </div>

  <div class="form-group mb-3">
    <label for="mailAdmin" class="form-label">Email commercial</label>
    <input type="email" id="mailAdmin" formControlName="mailAdmin" class="form-control" placeholder="Email commercial" />
  </div>

  <div class="form-group mb-3">
    <label>Emails en copie (CC)</label>
    <div *ngIf="veeamForm.get('ccMail') as cc">
      <div [formArrayName]="'ccMail'">
        <div *ngFor="let control of cc.controls; let i = index" class="d-flex mb-2">
          <input [formControlName]="i" type="email" class="form-control me-2" placeholder="Email en copie" />
          <button type="button" class="btn btn-danger" (click)="removeCcMail(i)">Supprimer</button>
        </div>
      </div>
    </div>
    <button type="button" class="btn btn-secondary mt-2" (click)="addCcMail()">Ajouter email</button>
  </div>

  <div class="form-group mb-3">
    <label for="remarque" class="form-label">Remarque</label>
    <textarea id="remarque" class="form-control" formControlName="remarque" placeholder="Remarque"></textarea>
  </div>

  <div class="form-group mb-3">
    <label for="fichier" class="form-label">Fichier (PDF, Excel, etc.)</label>
    <input type="file" id="fichier" class="form-control" (change)="onFileSelected($event)"
      accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.png,.jpg,.jpeg" />
    <small class="text-muted">Le fichier sera upload&#233; apr&#232;s la cr&#233;ation du Veeam</small>
  </div>

  <div class="form-buttons">
    <button type="submit" class="btn btn-primary">Ajouter</button>
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Annuler</button>
  </div>
</form>
